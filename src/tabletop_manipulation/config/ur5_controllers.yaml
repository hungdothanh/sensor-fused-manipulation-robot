# ur5_controllers.yaml
# =====================
# Loaded by gz_ros2_control via <parameters> tag in URDF.
# update_rate must be <= Gazebo physics rate (250 Hz).
# Controller types MUST be declared here — gz_ros2_control initialises
# controller_manager from this file. --param-file on the spawner is
# too late to set types (controller_manager rejects SetParameters after init).

controller_manager:
  ros__parameters:
    update_rate: 250

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_action_controller:
      type: position_controllers/GripperActionController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.6

gripper_action_controller:
  ros__parameters:
    joint: robotiq_85_left_knuckle_joint
    goal_tolerance: 0.01
    max_effort: 50.0
    stall_velocity_threshold: 0.001
    stall_timeout: 2.0
